<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO_APP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- TODO LIST CONTAINER -->
    <div class="container">

        <!-- NAVABAR SECTION -->
        <div class="navbar">
            <div id="profile_logo_container">
                <img src="profile.png" alt="profile-pic" id="profile-pic">
                <span id="logo">TODO - LIST</span>
            </div>
            <button id="theme-btn">Light Mode</button>
        </div>

        <!-- INPUT SECTION -->
        <div id="input_addBtn_container">
            <input type="text" id="input_box" placeholder="Enter New To-Do" autofocus>
            <button id="add_btn">Add</button>
        </div>

        <!-- PROGRESS OF TASK -->
        <div id="progress_container">
            <p class="progress_item" id="progress_item_1">Total Items = <span id="totalitems">0</span></p>
            <p class="progress_item" id="progress_item_2">Completed Items = <span id="completeditems">0</span></p>
            <p class="progress_item" id="progress_item_3">Pending Items = <span id="pendingitems">0</span></p>
            <!-- filter -->
            <div class="filter_container">
                <button id="filter_button">Filter</button>
                <div class="filter_options filter_visibility" >
                    <label>
                        <input type="checkbox" name="compCheckBox" id="filterCompleted">
                        Completed Items
                    </label>
                    <label>
                        <input type="checkbox" name="pendCheckBox" id="filterPending">
                        Pending Items
                    </label>
                </div>
            </div>
            <!-- Sort -->
            <div class="sort_container">
                <button id="sort_button">Sort</button>
                <div class="sort_options sort_visibility" >
                    <label>
                        <input type="checkbox" name="compCheckBox" id="sortCompleted">
                        Ascending Order
                    </label>
                    <label>
                        <input type="checkbox" name="pendCheckBox" id="sortPending">
                        Descending Order
                    </label>
                </div>
            </div>
            <!-- delete all -->
            <button id="delete_all_items">Delete All</button>
        </div>

        <!-- DISPLAYING TODO LIST -->
