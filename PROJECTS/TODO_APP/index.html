<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO APP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- TODO CONTAINER -->
    <div id="main-container">
        <!-- TASK INPUT SECTION -->
        <div id="task-input-container">
            <input type="text" id="input-box" placeholder="Write a todo..." aria-label="Add new task" autofocus>
            <button id="add-btn" class="btn">Add</button>
        </div>

        <!-- TASK CONTROLS SECTION -->
        <div id="task-controls-container">
            <div class="task-control task-control-1">
                Total Task <span id="total-task">0</span>
            </div>
            <div class="task-control task-control-2">
                Completed Task <span id="completed-task">0</span>
            </div>
            <div class="task-control task-control-3">
                Pending Task <span id="pending-task">0</span>
            </div>
            <!-- FILTER SECTION -->
            <div class="filter-container">
                <button id="filter-btn" class="btn">Filter</button>

                <!-- filter options -->
                <div id="filter-options" class="hide-filter-options">

                    <!-- option 1 -->
                    <label>
                        <input type="checkbox" id="filter-completed-item">
                        Completed
                    </label>

                    <!-- option 2 -->
                    <label>
                        <input type="checkbox" id="filter-pending-item">
                        Pending
                    </label>

                </div>
            </div>

            <!-- SORT SECTION -->
            <div class="sort-container">
                <button id="sort-btn" class="btn">Sort</button>
                
                <!-- sort options -->
                <div id="sort-options" class="hide-sort-options">

                    <!-- option 1 -->
                    <label>
                        <input type="checkbox" id="sort-ascending-order">
                        Ascending
                    </label>

                    <!-- option 2 -->
                    <label>
                        <input type="checkbox" id="sort-descending-order">
                        Descending
                    </label>

                </div>
            </div>
        </div>

        <!-- TASK SECTION -->
        <ul id="task-list"></ul>
    </div>

    <script src="app.js"></script>
</body>

</html>
